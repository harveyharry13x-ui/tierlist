<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Tier List - Fully Customizable Tier Maker</title>
<meta name="description" content="Create and customize your own tier lists with images, colors, and drag-and-drop. Fully customizable tier list maker.">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: Inter, system-ui, Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
    padding: 30px;
}

h1 {
    text-align: center;
    font-size: 2.6rem;
    font-family: 'Orbitron', sans-serif;
}

.landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 80vh;
}

.start-btn {
    margin-top: 20px;
    padding: 14px 30px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
}

.hidden { display: none; }

.container { max-width: 900px; margin: auto; }

.tier { display: flex; margin-bottom: 12px; border-radius: 12px; overflow: hidden; }
.label { width: 80px; display: flex; align-items: center; justify-content: center; }
.items { flex: 1; min-height: 90px; border: 2px dashed rgba(255,255,255,0.1); display: flex; flex-wrap: wrap; }

.item {
    width: 70px;
    height: 70px;
    margin: 6px;
    border-radius: 10px;
    background: rgba(255,255,255,0.15);
    cursor: grab;
    overflow: hidden;
}
.item img { width: 100%; height: 100%; object-fit: cover; }

button {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #6366f1, #3b82f6);
    color: white;
    cursor: pointer;
}

button[onclick="resetBoard()"] {
    background: linear-gradient(135deg, #ef4444, #b91c1c);
}

.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
}

/* Background switcher */
.top-bar {
  position: fixed;
  top: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.button-row {
  display: flex;
  gap: 6px;
}

</style>
</head>
<body>

<div class="top-bar">
  <div>Background</div>
  <div class="button-row">
    <button onclick="setBackground('original')">Original</button>
    <button onclick="setBackground('black')">Black</button>
    <button onclick="setBackground('white')">White</button>
    <button onclick="setBackground('green')">Green</button>
    <button onclick="setBackground('red')">Red</button>
  </div>
</div>

<div id="landing" class="landing">
    <h1>WELCOME TO CUSTOM TIER LIST</h1>
    <button class="start-btn" onclick="startApp()">Get Started</button>
</div>

<div id="app" class="hidden">
<button class="back-btn" onclick="goBack()">← Back</button>

<div class="container">
<h1>Custom Tier List</h1>

<div id="tiers"></div>

<h2>Item Pool</h2>
<div id="pool"></div>

<button onclick="addTier()">Add Tier</button>
<button onclick="addItem()">Add Item</button>
<button onclick="document.getElementById('imageInput').click()">Add Image</button>
<button onclick="resetBoard()">Reset</button>

<input type="file" id="imageInput" accept="image/*" style="display:none" onchange="addImage(event)">

</div>
</div>

<script>
function startApp() {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
}

function goBack() {
    document.getElementById('app').classList.add('hidden');
    document.getElementById('landing').style.display = 'flex';
}

function setBackground(mode) {
  const body = document.body;

  if (mode === 'original') body.style.background = 'linear-gradient(135deg, #0f172a, #1e293b)';
  if (mode === 'black') body.style.background = '#000';
  if (mode === 'white') body.style.background = '#fff';
  if (mode === 'green') body.style.background = '#064e3b';
  if (mode === 'red') body.style.background = '#7f1d1d';
}

let tierCount = 0;
let dragged = null;

function createTier(name, color) {
    const tier = document.createElement("div");
    tier.className = "tier";

    const label = document.createElement("div");
    label.className = "label";
    label.style.background = color;
    label.innerText = name;

    const items = document.createElement("div");
    items.className = "items";
    items.ondragover = (e) => e.preventDefault();
    items.ondrop = drop;

    tier.appendChild(label);
    tier.appendChild(items);

    document.getElementById("tiers").appendChild(tier);
}

function getRandomColor() {
    return '#' + Math.floor(Math.random()*16777215).toString(16);
}

function addTier() {
    tierCount++;
    createTier("Tier " + tierCount, getRandomColor());
}

function createDraggableItem() {
    const item = document.createElement("div");
    item.className = "item";
    item.draggable = true;
    item.ondragstart = drag;
    return item;
}

function addItem() {
    const item = createDraggableItem();
    item.innerText = "Item";
    document.getElementById("pool").appendChild(item);
}

function addImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const item = createDraggableItem();
        const img = document.createElement("img");
        img.src = e.target.result;
        item.appendChild(img);
        document.getElementById("pool").appendChild(item);
    };
    reader.readAsDataURL(file);
}

function drag(e) {
    dragged = e.target.closest('.item');
}

function drop(e) {
    e.preventDefault();
    const zone = e.target.closest('.items, #pool');
    if (dragged && zone) zone.appendChild(dragged);
}

function resetBoard() {
    document.getElementById("tiers").innerHTML = "";
    document.getElementById("pool").innerHTML = "";
    tierCount = 0;

    createTier("S", "#ef4444");
    createTier("A", "#f97316");
    createTier("B", "#eab308");
    createTier("C", "#22c55e");
    createTier("D", "#3b82f6");
}

resetBoard();
</script>

</body>
</html>
